name: AgentLayer public-site CI

on:
  pull_request:
  workflow_dispatch:

env:
  AGENTLAYER_TARGET_URL: https://example.com
  AGENTLAYER_COMMITTED_BASELINE: ./agentlayer-baseline.json
  AGENTLAYER_ARTIFACT_DIR: ./agentlayer-ci

jobs:
  agentlayer-public-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Create current baseline artifact
        run: |
          mkdir -p "$AGENTLAYER_ARTIFACT_DIR"
          # After @agentlayer/cli is published, replace "pnpm agentlayer" with
          # "pnpm dlx @agentlayer/cli".
          pnpm agentlayer baseline "$AGENTLAYER_TARGET_URL" \
            --out "$AGENTLAYER_ARTIFACT_DIR/current-baseline.json" \
            --max-pages 20

      - name: Compare public site against committed baseline
        run: |
          pnpm agentlayer compare "$AGENTLAYER_TARGET_URL" \
            --baseline "$AGENTLAYER_COMMITTED_BASELINE" \
            --out "$AGENTLAYER_ARTIFACT_DIR/compare.json" \
            --fail-on task-regression \
            --fail-on missing-artifact \
            --max-pages 20

      - name: Upload AgentLayer baseline artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentlayer-current-baseline
          path: ${{ env.AGENTLAYER_ARTIFACT_DIR }}/current-baseline.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload AgentLayer compare artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentlayer-compare
          path: ${{ env.AGENTLAYER_ARTIFACT_DIR }}/compare.json
          if-no-files-found: warn
          retention-days: 14

name: Publish v0.1.0 Release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v0.1.0-release.yml

permissions:
  contents: write

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Create v0.1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TARGET: a26a3203c8401ede5ef045a59b4f95cc16160ba5
        run: |
          set -euo pipefail
          if gh release view v0.1.0 >/dev/null 2>&1; then
            echo "Release v0.1.0 already exists."
            exit 0
          fi
          gh release create v0.1.0 \
            --target "$RELEASE_TARGET" \
            --title "AgentLayer v0.1.0" \
            --notes-file release-notes/v0.1.0.md \
            --latest
